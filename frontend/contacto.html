<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Kelowna.Oropezas.com</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

  <header></header>

  <main>
    <div class="container" style="max-width:680px; padding: 3rem 1.5rem;">
      <h1 class="page-title">Contact</h1>
      <p class="page-description">Got a tip, story, or question? Reach out to us.</p>

      <form id="contact-form" style="margin-top:2rem;" onsubmit="handleSubmit(event)">
        <div class="form-group" style="margin-bottom:1.2rem;">
          <label style="display:block; font-size:.85rem; font-weight:600; margin-bottom:.4rem;">Name</label>
          <input type="text" name="name" required placeholder="Your name" style="width:100%; padding:.75rem 1rem; border:1px solid #ddd; border-radius:4px; font-size:1rem; outline:none;">
        </div>
        <div class="form-group" style="margin-bottom:1.2rem;">
          <label style="display:block; font-size:.85rem; font-weight:600; margin-bottom:.4rem;">Email</label>
          <input type="email" name="email" required placeholder="your@email.com" style="width:100%; padding:.75rem 1rem; border:1px solid #ddd; border-radius:4px; font-size:1rem; outline:none;">
        </div>
        <div class="form-group" style="margin-bottom:1.2rem;">
          <label style="display:block; font-size:.85rem; font-weight:600; margin-bottom:.4rem;">Message</label>
          <textarea name="message" required placeholder="Write your message..." rows="5" style="width:100%; padding:.75rem 1rem; border:1px solid #ddd; border-radius:4px; font-size:1rem; outline:none; resize:vertical;"></textarea>
        </div>
        <button type="submit" class="btn-primary" style="background:#000; color:#fff; border:none; padding:.85rem 2rem; font-size:.95rem; font-weight:700; border-radius:4px; cursor:pointer; letter-spacing:.04em;">
          Send Message
        </button>
        <p id="form-message" style="margin-top:1rem; font-size:.9rem; color:green; display:none;"></p>
      </form>
    </div>
  </main>

  <footer>
    <p>&copy; <span id="footer-year"></span> Kelowna.Oropezas.com</p>
  </footer>

  <script>
    document.getElementById('footer-year').textContent = new Date().getFullYear();

    function handleSubmit(e) {
      e.preventDefault();
      const msg = document.getElementById('form-message');
      msg.textContent = 'Thanks! We will get back to you soon.';
      msg.style.display = 'block';
      e.target.reset();
    }
  </script>
  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
